name: CI/CD — Skill Stack Architecture

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: npx next build

  type-check:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: npx tsc --noEmit

  health-check:
    name: Health Endpoint
    runs-on: ubuntu-latest
    needs: lint-build
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: npx next build
      - run: |
          npx next start -p 3001 &
          sleep 5
          curl -sf http://localhost:3001/api/health | jq .status
          kill %1
